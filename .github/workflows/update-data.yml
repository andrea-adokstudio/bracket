name: Update Sofascore Data

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # SofaScore spesso risponde 403 dagli IP GitHub: imposta i secrets HTTPS_PROXY (e se serve
      # HTTP_PROXY) con un proxy raggiungibile dal runner. Alternativa: runner self-hosted o PR con
      # data/*.json aggiornati da locale (`npm run fetch-data`).
      - name: Fetch latest data (with retries)
        env:
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: |
          for i in 1 2 3; do
            if npm run fetch-data; then
              exit 0
            fi
            echo "fetch-data failed (attempt $i), retrying..."
            sleep 15
          done
          echo "fetch-data failed after 3 attempts"
          exit 1

      - name: Commit and push if changed
        run: |
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"

          if git diff --quiet -- data/standings.json data/events.json; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/standings.json data/events.json
          git commit -m "chore(data): update sofascore snapshots"
          git push origin HEAD:"${GITHUB_REF_NAME}"
